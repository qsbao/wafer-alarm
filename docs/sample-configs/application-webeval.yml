# Web + Evaluator VM (no collector)
# Start with: java -jar wafer-alarm.jar --spring.profiles.active=webeval

spring:
  datasource:
    url: jdbc:mysql://mysql-host:3306/wafer_alarm?useSSL=true
    username: wafer_app
    password: ${DB_PASSWORD}

app:
  collector:
    poll-interval-seconds: 999999
  evaluator:
    pool-size: 4
    tick-interval-seconds: 60
    overlap-window-minutes: 10
