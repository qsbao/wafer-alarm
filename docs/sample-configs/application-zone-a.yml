# Collector VM for Zone A
# Start with: java -jar wafer-alarm.jar --spring.profiles.active=zone-a

spring:
  datasource:
    url: jdbc:mysql://mysql-host:3306/wafer_alarm?useSSL=true
    username: wafer_app
    password: ${DB_PASSWORD}

app:
  collector:
    owned-source-system-ids: 1,2
    pool-size: 2
    poll-interval-seconds: 60
  evaluator:
    tick-interval-seconds: 999999
