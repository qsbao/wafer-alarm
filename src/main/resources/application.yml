spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wafer_alarm?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

app:
  collector:
    pool-size: 2
    poll-interval-seconds: 60
  evaluator:
    pool-size: 2
    tick-interval-seconds: 60
    overlap-window-minutes: 10
